<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sandra Gómez — Work</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="work">

  <header class="topnav" id="topnav"></header>

  <div class="page">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <section class="section" id="work">
        <div class="section__header">
          <span class="section__label">Work</span>
          <div class="work__filters" id="work-filters"></div>
        </div>
        <div class="work__grid" id="work-grid"></div>
      </section>
      <footer class="footer">
        <span class="footer__copy"></span>
        <button class="footer__edit-btn" id="edit-toggle" title="Open content manager">✏</button>
      </footer>
    </main>
  </div>

  <div class="modal" id="project-modal">
    <div class="modal__topbar">
      <button class="modal__back" id="modal-back" type="button">&larr; back to work</button>
      <span class="modal__esc-hint">ESC</span>
    </div>
    <div class="modal__content">
      <div class="modal__viewer" id="modal-viewer">
        <div class="modal__track" id="modal-track"></div>
        <button class="modal__nav modal__nav--prev" id="modal-prev" aria-label="Previous">‹</button>
        <button class="modal__nav modal__nav--next" id="modal-next" aria-label="Next">›</button>
      </div>
      <div class="modal__dots" id="modal-dots"></div>
      <div class="modal__info">
        <div class="modal__meta">
          <h2 class="modal__title" id="modal-title"></h2>
          <span class="modal__category" id="modal-category"></span>
        </div>
        <p class="modal__description" id="modal-description"></p>
      </div>
    </div>
  </div>

  <!-- Netlify Identity — handles invite/login redirects to /admin -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', function(user) {
        if (!user) {
          window.netlifyIdentity.on('login', function() {
            document.location.href = '/admin/';
          });
        }
      });
    }
  </script>
  <!-- Fallback data for local file:// testing -->
  <script src="js/content.js"></script>
  <!-- App modules (define functions, do not execute yet) -->
  <script src="js/layout.js"></script>
  <script src="js/render.js"></script>
  <script src="js/editor.js"></script>
  <!-- Loads JSON data then calls all init functions -->
  <script src="js/data.js"></script>
</body>
</html>
