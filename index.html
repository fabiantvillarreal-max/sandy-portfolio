<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sandra Gómez — Work</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="work">

  <header class="topnav" id="topnav"></header>

  <div class="page">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <section class="section" id="work">
        <div class="section__header">
          <span class="section__label">Work</span>
          <div class="work__filters" id="work-filters"></div>
        </div>
        <div class="work__grid" id="work-grid"></div>
      </section>
      <footer class="footer">
        <span class="footer__copy"></span>
        <button class="footer__edit-btn" id="edit-toggle" title="Open content manager">✏</button>
      </footer>
    </main>
  </div>

  <div class="modal" id="video-modal">
    <div class="modal__backdrop" id="modal-backdrop"></div>
    <div class="modal__content">
      <button class="modal__close" id="modal-close">✕</button>
      <div class="modal__video" id="modal-video"></div>
    </div>
  </div>

  <!-- Netlify Identity — handles invite/login redirects to /admin -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', function(user) {
        if (!user) {
          window.netlifyIdentity.on('login', function() {
            document.location.href = '/admin/';
          });
        }
      });
    }
  </script>
  <!-- Fallback data for local file:// testing -->
  <script src="js/content.js"></script>
  <!-- App modules (define functions, do not execute yet) -->
  <script src="js/layout.js"></script>
  <script src="js/render.js"></script>
  <script src="js/editor.js"></script>
  <!-- Loads JSON data then calls all init functions -->
  <script src="js/data.js"></script>
</body>
</html>
